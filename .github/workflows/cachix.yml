name: "Cachix — build & cache"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: shojivm
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: true  # Disable post-step push (post-step can't access secrets)

      - name: Build & push to Cachix
        run: |
          # Start watch-store push in background, then build
          # This pushes any new store paths built by nix
          cachix push shojivm --watch-store --watch-store-timeout 5 &
          nix build ".#packages.x86_64-linux.shojiwm"
          wait
        env:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
